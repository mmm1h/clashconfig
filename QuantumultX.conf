[policy]
# --- 核心手动策略组 ---
static=🚀 节点选择, ♻️ 自动选择, DIRECT, 🇭🇰 香港, 🇨🇳 台湾, 🇸🇬 新加, 🇯🇵 日本, 🇺🇸 美国, 🌐 其他地区, 🎮 游戏专用
static=🐟 漏网之鱼, 🚀 节点选择, DIRECT,🇭🇰 香港, ♻️ 自动选择, 🇯🇵 日本, 🇺🇸 美国, 🎮 游戏专用
static=🤖 AI节点,😈 AI测速
static=📺 国外媒体, ♻️ 自动选择, 🇭🇰 香港, 🚀 节点选择, 🇨🇳 台湾, 🇸🇬 新加, 🇯🇵 日本, 🇺🇸 美国
static=🎮 游戏专用, DIRECT, 🚀 节点选择, 🇭🇰 香港, 🇯🇵 日本, 🇺🇸 美国
static=Ⓜ️ 微软服务, DIRECT, 🚀 节点选择, 🎮 游戏专用
static=🎯 全球直连, DIRECT, 🚀 节点选择
static=🚫 广告屏蔽, REJECT, DIRECT

# --- 自动测速策略组
url-latency-benchmark=♻️ 自动选择, server-tag-regex=(?=.*(港|HK|Hong Kong|🇭🇰|HongKong))^((?!(2x|4x)).)*$, check-interval=300, tolerance=50
url-latency-benchmark=😈 AI测速, server-tag-regex=(?=.*(gpt|GPT|openai|OpenAI|US|America|United States|美国|美|SG|Singapore|新加坡|狮城|坡|JP|Japan|日本))^((?!(4x|2x)).)*$, check-interval=300, tolerance=50

# --- 地区筛选策略组 (手动选择) ---
static=🇭🇰 香港, server-tag-regex=(?=.*(HK|Hong Kong|香港|港))^((?!(2x|4x)).)*$
static=🇨🇳 台湾, server-tag-regex=(TW|Taiwan|台湾|台)
static=🇸🇬 新加, server-tag-regex=(?=.*(SG|Singapore|新加坡|狮城|坡))^((?!(2x|4x)).)*$
static=🇯🇵 日本, server-tag-regex=(?=.*(JP|Japan|日本|川日|东京|大阪|泉日|埼玉|沪日|深日))^((?!(2x|4x)).)*$
static=🇺🇸 美国, server-tag-regex=(?=.*(US|America|United States|美国|美))^((?!(2x|4x)).)*$
static=🌐 其他地区, server-tag-regex=^(?!.*(?i)(HK|Hong Kong|香港|港|TW|Taiwan|台湾|台|SG|Singapore|新加坡|狮城|坡|JP|Japan|日本|US|America|United States|美国|美|流量|剩余|应急|官网|套餐)).*$


